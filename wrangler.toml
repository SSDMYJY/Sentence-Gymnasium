# Cloudflare Workers (ES module) config for Sentence Gymnasium.
# `main` points to Nitro's cloudflare-module build output.
# Local dev: nitro-cloudflare-dev reads this file to provide the D1 binding.
# Prod deploy: run `npx wrangler deploy` after `npm run build`.
name = "sentence-gymnasium"
main = "./.output/server/index.mjs"
compatibility_date = "2025-07-01"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = "./.output/public"
binding = "ASSETS"

[[d1_databases]]
# binding name accessed as event.context.cloudflare.env.DB
binding = "DB"
database_name = "sentence_gym"
# Placeholder UUID for local dev. Replace with real id from
# `npx wrangler d1 create sentence_gym` before deploying to prod.
database_id = "cd74f697-5c41-4980-a97d-8abaa1de5a08"
migrations_dir = "migrations"
# remote = true

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

[vars]
AI_BASE_URL = "https://token.sensenova.cn/v1"
AI_MODEL= "deepseek-v4-flash"
