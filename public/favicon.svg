<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="gymGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Dumbbell bar -->
  <rect x="30" y="38" width="60" height="9" rx="4.5" fill="url(#barGrad)"/>

  <!-- Left weight plate -->
  <rect x="20" y="24" width="14" height="37" rx="4" fill="url(#gymGrad)"/>
  <rect x="23" y="30" width="8" height="25" rx="3" fill="#6D28D9"/>

  <!-- Right weight plate -->
  <rect x="86" y="24" width="14" height="37" rx="4" fill="url(#gymGrad)"/>
  <rect x="89" y="30" width="8" height="25" rx="3" fill="#6D28D9"/>

  <!-- Speech bubble tail -->
  <path d="M36 74 Q30 90 42 90 Q54 90 48 74" fill="url(#accentGrad)" opacity="0.9"/>

  <!-- Sentence lines -->
  <rect x="36" y="58" width="48" height="4" rx="2" fill="#7C3AED" opacity="0.75"/>
  <rect x="42" y="67" width="36" height="4" rx="2" fill="#8B5CF6" opacity="0.55"/>
  <rect x="39" y="76" width="42" height="4" rx="2" fill="#A78BFA" opacity="0.38"/>

  <!-- Accent dots -->
  <circle cx="36" cy="102" r="3.5" fill="#06B6D4" opacity="0.65"/>
  <circle cx="50" cy="102" r="3.5" fill="#8B5CF6" opacity="0.65"/>
  <circle cx="64" cy="102" r="3.5" fill="#06B6D4" opacity="0.45"/>
  <circle cx="78" cy="102" r="3.5" fill="#A78BFA" opacity="0.35"/>
</svg>