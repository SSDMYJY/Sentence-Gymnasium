<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 140" width="520" height="140">
  <defs>
    <linearGradient id="gymGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon Mark: Speech-bubble-dumbbell hybrid -->
  <g transform="translate(12, 14)">
    <!-- Outer rounded shield / badge shape -->
    <rect x="4" y="4" width="72" height="90" rx="18" ry="18" fill="url(#gymGrad)" opacity="0.12"/>

    <!-- Dumbbell bar -->
    <rect x="18" y="28" width="44" height="7" rx="3.5" fill="url(#barGrad)"/>

    <!-- Left weight plate -->
    <rect x="12" y="18" width="10" height="27" rx="3" fill="url(#gymGrad)"/>
    <rect x="14" y="22" width="6" height="19" rx="2" fill="#6D28D9"/>

    <!-- Right weight plate -->
    <rect x="58" y="18" width="10" height="27" rx="3" fill="url(#gymGrad)"/>
    <rect x="60" y="22" width="6" height="19" rx="2" fill="#6D28D9"/>

    <!-- Speech bubble tail (lower left) -->
    <path d="M22 60 Q18 72 26 72 Q34 72 30 60" fill="url(#accentGrad)" opacity="0.85"/>

    <!-- Inner text lines representing sentences -->
    <rect x="22" y="44" width="36" height="3" rx="1.5" fill="#7C3AED" opacity="0.7"/>
    <rect x="26" y="51" width="28" height="3" rx="1.5" fill="#8B5CF6" opacity="0.5"/>
    <rect x="24" y="58" width="32" height="3" rx="1.5" fill="#A78BFA" opacity="0.35"/>

    <!-- Small accent dots -->
    <circle cx="22" cy="80" r="2.5" fill="#06B6D4" opacity="0.6"/>
    <circle cx="32" cy="80" r="2.5" fill="#8B5CF6" opacity="0.6"/>
    <circle cx="42" cy="80" r="2.5" fill="#06B6D4" opacity="0.4"/>
  </g>

  <!-- "Sentence" text -->
  <text x="104" y="58"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="22"
        font-weight="300"
        letter-spacing="3.5"
        fill="#6B7280">
    Sentence
  </text>

  <!-- "GYMNASIUM" text -->
  <text x="104" y="102"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="44"
        font-weight="800"
        letter-spacing="4"
        fill="url(#gymGrad)">
    GYMNASIUM
  </text>

  <!-- Accent underline bar -->
  <rect x="106" y="110" width="140" height="3.5" rx="1.75" fill="url(#accentGrad)"/>

  <!-- Tagline -->
  <text x="104" y="130"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="11"
        font-weight="400"
        letter-spacing="1.5"
        fill="#9CA3AF">
    EN &amp; JP TRAINING PLATFORM
  </text>

  <!-- Decorative bracket marks around GYMNASIUM -->
  <text x="396" y="103"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="44"
        font-weight="200"
        fill="#C4B5FD" opacity="0.4">
    ]
  </text>
  <text x="95" y="103"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="44"
        font-weight="200"
        fill="#C4B5FD" opacity="0.4">
    [
  </text>
</svg>